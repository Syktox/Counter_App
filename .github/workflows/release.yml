name: Build And Release

on:
  push:
    tags:
      - "v*"
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag, for example v1.1.4"
        required: true

permissions:
  contents: write

env:
  JAVA_VERSION: "17"

jobs:
  prepare_release:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.resolve_tag.outputs.tag_name }}
      release_name: ${{ steps.resolve_tag.outputs.release_name }}
      release_notes: ${{ steps.release_notes.outputs.release_notes }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: resolve_tag
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            RAW_TAG="${{ github.event.inputs.tag }}"
          else
            RAW_TAG="${GITHUB_REF_NAME}"
          fi

          if git rev-parse "refs/tags/${RAW_TAG}" >/dev/null 2>&1; then
            TAG_NAME="${RAW_TAG}"
          elif [[ "${RAW_TAG}" != v* ]] && git rev-parse "refs/tags/v${RAW_TAG}" >/dev/null 2>&1; then
            TAG_NAME="v${RAW_TAG}"
          else
            echo "Tag not found: ${RAW_TAG}"
            exit 1
          fi

          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "release_name=Release ${TAG_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Generate release notes
        id: release_notes
        shell: bash
        run: |
          TAG_NAME="${{ steps.resolve_tag.outputs.tag_name }}"
          CURRENT_COMMIT="$(git rev-list -n 1 "${TAG_NAME}")"
          PREVIOUS_TAG="$(git tag --sort=-creatordate | grep -Fxv "${TAG_NAME}" | head -n 1 || true)"

          {
            echo "release_notes<<EOF"
            echo "## Changes"
            echo
            if [[ -n "${PREVIOUS_TAG}" ]]; then
              echo "Commits since ${PREVIOUS_TAG}:"
              echo
              git log "${PREVIOUS_TAG}..${CURRENT_COMMIT}" --pretty=format:'- %s (%h)'
            else
              echo "Initial release commits:"
              echo
              git log "${CURRENT_COMMIT}" --pretty=format:'- %s (%h)' -n 20
            fi
            echo
            echo
            echo "## Artifacts"
            echo
            echo "- Android APK"
            echo "- Android App Bundle"
            echo "- Windows ZIP"
            echo "- macOS ZIP"
            echo "- iOS unsigned app ZIP"
            echo
            echo "_The iOS artifact is built without code signing. For TestFlight or App Store distribution you still need Apple signing credentials and an export step._"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

  build_android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: prepare_release
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.prepare_release.outputs.tag_name }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Build Android APK
        run: flutter build apk --release

      - name: Build Android App Bundle
        run: flutter build appbundle --release

      - name: Collect Android artifacts
        shell: bash
        run: |
          mkdir -p release-assets
          cp build/app/outputs/flutter-apk/app-release.apk \
            "release-assets/counter-android-${{ needs.prepare_release.outputs.tag_name }}.apk"
          cp build/app/outputs/bundle/release/app-release.aab \
            "release-assets/counter-android-${{ needs.prepare_release.outputs.tag_name }}.aab"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-assets
          path: release-assets/*

  build_windows:
    name: Build Windows
    runs-on: windows-latest
    needs: prepare_release
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.prepare_release.outputs.tag_name }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Build Windows app
        run: flutter build windows --release

      - name: Archive Windows build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Compress-Archive `
            -Path build/windows/x64/runner/Release/* `
            -DestinationPath "release-assets/counter-windows-${{ needs.prepare_release.outputs.tag_name }}.zip" `
            -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-assets
          path: release-assets/*

  build_macos:
    name: Build macOS
    runs-on: macos-latest
    needs: prepare_release
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.prepare_release.outputs.tag_name }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Build macOS app
        run: flutter build macos --release

      - name: Archive macOS app bundle
        shell: bash
        run: |
          mkdir -p release-assets
          ditto -c -k --sequesterRsrc --keepParent \
            build/macos/Build/Products/Release/counter_app.app \
            "release-assets/counter-macos-${{ needs.prepare_release.outputs.tag_name }}.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-assets
          path: release-assets/*

  build_ios:
    name: Build iOS
    runs-on: macos-latest
    needs: prepare_release
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.prepare_release.outputs.tag_name }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign

      - name: Archive iOS app
        shell: bash
        run: |
          mkdir -p release-assets
          ditto -c -k --sequesterRsrc --keepParent \
            build/ios/iphoneos/Runner.app \
            "release-assets/counter-ios-unsigned-${{ needs.prepare_release.outputs.tag_name }}.zip"

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-assets
          path: release-assets/*

  publish_release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - prepare_release
      - build_android
      - build_windows
      - build_macos
      - build_ios
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare_release.outputs.tag_name }}
          name: ${{ needs.prepare_release.outputs.release_name }}
          body: ${{ needs.prepare_release.outputs.release_notes }}
          files: release-assets/*
          draft: false
          prerelease: false
